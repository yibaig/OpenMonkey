[package]
name = "openmonkey-agent"
version = "0.1.0"
edition = "2021"
description = "OpenMonkey 多 Agent 编排器"
authors = ["OpenMonkey Team <yibaig@openmonkey.ai>"]

[dependencies]
# 异步运行时
tokio = { version = "1.0", features = ["full"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 错误处理
thiserror = "1.0"
anyhow = "1.0"

# 日志
tracing = "0.1"

# 通道通信
tokio-stream = "0.1"

# UUID
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
tokio-test = "0.4"
