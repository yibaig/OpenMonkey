[package]
name = "openmonkey-skill"
version = "0.1.0"
edition = "2021"
description = "OpenMonkey 技能引擎 - 支持 WASM 沙箱执行"
authors = ["OpenMonkey Team <yibaig@openmonkey.ai>"]

[dependencies]
# WASM 运行时（使用稳定版本）
wasmtime = "15.0"
wasmtime-wasi = "15.0"

# UUID
uuid = { workspace = true }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 异步运行时
tokio = { version = "1.0", features = ["full"] }

# 错误处理
thiserror = "1.0"
anyhow = "1.0"

# 日志
tracing = "0.1"

# 正则表达式
regex = "1.10"

# 路径处理
pathdiff = "0.2"

[dev-dependencies]
tokio-test = "0.4"
