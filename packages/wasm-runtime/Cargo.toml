[package]
name = "openmonkey-wasm-runtime"
version = "0.1.0"
edition = "2021"
description = "OpenMonkey WASM 运行时 - 技能安全执行沙箱"
authors = ["OpenMonkey Team <yibaig@openmonkey.ai>"]

[dependencies]
# WASM 运行时
wasmtime = "15.0"
wasmtime-wasi = "15.0"

# 异步运行时
tokio = { version = "1.0", features = ["full"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 错误处理
thiserror = "1.0"
anyhow = "1.0"

# 日志
tracing = "0.1"

# 字节处理
bytes = "1.5"

[dev-dependencies]
tokio-test = "0.4"
